<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC 電源供應器選購助手 | Tech Edition</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            /* 科技感深色漸層背景 */
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 40%, #020617 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        /* 玻璃擬態 (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .options-container {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out, margin-top 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            margin-top: 0;
        }
        .options-container.expanded {
            max-height: 800px;
            opacity: 1;
            margin-top: 0.75rem;
            overflow: visible;
        }
        
        /* 自訂暗色系捲軸 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="font-sans p-4 md:p-8 lg:p-12">

    <div class="max-w-5xl mx-auto">
        <!-- 頂部 Header -->
        <header class="mb-10">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div class="flex-grow">
                    <h1 id="ui-title" class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 mb-2 tracking-tight">
                        PC 電源供應器選購助手
                    </h1>
                    <p id="ui-desc" class="text-slate-400">點擊類別展開選項，系統將為您即時篩選合適的電源。</p>
                    
                    <div id="status-text-top" class="text-sm font-medium text-blue-200 mt-3 hidden px-4 py-1.5 rounded-full bg-blue-900/30 border border-blue-500/30 inline-block shadow-[0_0_10px_rgba(59,130,246,0.2)]">
                        <span id="ui-status-label-top">目前符合條件：</span><span id="result-count-top" class="font-bold text-lg text-white ml-1">0</span> <span id="ui-unit-top">款</span>
                    </div>
                </div>

                <!-- 語系切換與操作區 -->
                <div class="flex flex-col items-end gap-3">
                    <!-- 語言切換器 -->
                    <div class="flex bg-white/5 border border-white/10 p-1 rounded-xl shadow-inner backdrop-blur-md">
                        <button onclick="changeLang('tw')" id="lang-tw" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all bg-blue-600 text-white shadow-lg">TW</button>
                        <button onclick="changeLang('en')" id="lang-en" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200">EN</button>
                    </div>

                    <button id="reset-btn" class="hidden px-5 py-2.5 bg-white/5 hover:bg-white/10 text-slate-300 text-sm font-semibold rounded-xl border border-white/10 transition-all flex items-center gap-2">
                        <i data-lucide="rotate-ccw" class="w-4 h-4 text-blue-400"></i> <span id="ui-reset">重新選取</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 篩選器容器 (Glassmorphism) -->
        <div id="filters-container" class="glass-panel rounded-3xl shadow-2xl p-6 md:p-10 mb-8 min-h-[150px] relative">
            <div id="loading-msg" class="absolute inset-0 flex items-center justify-center text-blue-400 animate-pulse font-medium">
                <i data-lucide="loader-2" class="w-5 h-5 mr-2 animate-spin"></i> <span id="ui-loading">正在載入雲端資料庫...</span>
            </div>
            <!-- 動態生成的篩選器 -->
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-10 min-h-[40px] gap-4">
            <div id="status-text-bottom" class="text-sm font-medium text-slate-400 hidden">
                <span id="ui-status-label-bottom">為您篩選出</span> <span id="result-count-bottom" class="text-blue-400 font-bold text-lg">0</span> <span id="ui-unit-bottom">款電源</span>
            </div>
            <button id="show-results-btn" class="hidden px-8 py-3 bg-blue-600/80 hover:bg-blue-500 text-white font-bold rounded-2xl transition-all border border-blue-400/50 shadow-[0_0_15px_rgba(59,130,246,0.4)] ml-auto flex items-center gap-2">
                <i data-lucide="zap" class="w-5 h-5"></i> <span id="ui-expand">展開篩選結果</span>
            </button>
        </div>

        <!-- 結果顯示區 -->
        <div id="results-area" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 pb-24">
            <!-- 卡片由 JS 動態生成 -->
        </div>
    </div>

    <script>
        /**
         * 語系字典 (i18n Dictionary)
         */
        const i18n = {
            tw: {
                title: "PC 電源供應器選購助手",
                desc: "點擊類別展開選項，系統將為您即時篩選合適的電源。",
                loading: "正在載入雲端資料庫...",
                reset: "重新選取設定",
                statusLabelTop: "目前符合條件：",
                unitTop: "款",
                statusLabelBottom: "為您篩選出",
                unitBottom: "款電源",
                expand: "展開篩選結果",
                noResult: "查無符合條件的電源供應器",
                // 類別標籤
                cat_Form_Factor: "電源尺寸 (Form Factor)",
                cat_ATX_Version: "ATX 規範版本",
                cat_Wattage_W: "額定瓦數 (W)",
                cat_Efficiency_Level: "效率等級 (80 PLUS)",
                cat_Modular_Type: "線材設計",
                cat_Input_Voltage_Group: "輸入電壓 (Input Voltage)",
                cat_Operating_Altitude: "工作海拔",
                cat_Working_Temp: "工作溫度",
                cat_12V_2x6_Ports: "12V-2x6 接頭數",
                cat_Price_Positioning: "系統精選機種",
                // 卡片標籤
                label_efficiency: "效率",
                label_modular: "線材",
                label_ports: "12V-2x6",
                label_voltage: "輸入電壓",
                label_altitude: "工作海拔",
                label_temp: "工作溫度",
                val_none: "無",
                val_unit_ports: "組"
            },
            en: {
                title: "PC PSU Selector",
                desc: "Select categories to filter the perfect power supply for your system.",
                loading: "Syncing database...",
                reset: "Reset Filters",
                statusLabelTop: "Matched: ",
                unitTop: " Units",
                statusLabelBottom: "Found ",
                unitBottom: " compatible PSUs",
                expand: "View Results",
                noResult: "No matching power supplies found.",
                // Category Labels
                cat_Form_Factor: "Form Factor",
                cat_ATX_Version: "ATX Version",
                cat_Wattage_W: "Wattage (W)",
                cat_Efficiency_Level: "Efficiency (80 PLUS)",
                cat_Modular_Type: "Modular Design",
                cat_Input_Voltage_Group: "Input Voltage",
                cat_Operating_Altitude: "Altitude",
                cat_Working_Temp: "Working Temp",
                cat_12V_2x6_Ports: "12V-2x6 Ports",
                cat_Price_Positioning: "High C/P Units",
                // Card Labels
                label_efficiency: "Efficiency",
                label_modular: "Modular",
                label_ports: "12V-2x6",
                label_voltage: "Voltage",
                label_altitude: "Altitude",
                label_temp: "Temp",
                val_none: "None",
                val_unit_ports: " Port(s)"
            }
        };

        let currentLang = 'tw';
        const DATA_SOURCE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZx7dFscS4QzuHlmZTJrYCqXTtSIf4vR-aqr4dIai7cTLfycA1MQA85Q09dj3jXUwwNCdwYn9nFNuL/pub?output=csv';

        let allData = [];            
        let filteredData = [];       
        let selectedFilters = {};    
        let expandedCategories = new Set(); 
        let selectedWattageRange = null; 
        let selectedInputVoltage1 = null; 

        const WATTAGE_RANGES = [
            { id: 'low', label: '<= 500W', min: 0, max: 500 },
            { id: 'mid', label: '501W - 1000W', min: 501, max: 1000 },
            { id: 'high', label: '> 1000W', min: 1001, max: 99999 }
        ];

        const CATEGORIES = [
            { key: 'Form_Factor', icon: 'box' },
            { key: 'ATX_Version', icon: 'file-text' },
            { key: 'Wattage_W', icon: 'battery-charging' },
            { key: 'Efficiency_Level', icon: 'award' },
            { key: 'Modular_Type', icon: 'cable' },
            { key: 'Input_Voltage_Group', type: 'group_2_levels', icon: 'plug' }, 
            { key: 'Operating_Altitude', icon: 'mountain' },
            { key: 'Working_Temp', icon: 'thermometer' },
            { key: '12V_2x6_Ports', icon: 'cpu' },
            { key: 'Price_Positioning', type: 'toggle', toggleValue: 'V', icon: 'zap' } 
        ];

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadDataFromURL();

            document.getElementById('show-results-btn').addEventListener('click', () => {
                document.getElementById('results-area').classList.remove('hidden');
                document.getElementById('show-results-btn').classList.add('hidden');
                renderResults(); 
            });

            document.getElementById('reset-btn').addEventListener('click', () => {
                selectedFilters = {};
                expandedCategories = new Set();
                selectedWattageRange = null;
                selectedInputVoltage1 = null;
                updateLogic();
                renderFilterUI();
            });
        });

        /**
         * 語系切換
         */
        function changeLang(lang) {
            currentLang = lang;
            
            // UI 按鈕狀態
            const btnTw = document.getElementById('lang-tw');
            const btnEn = document.getElementById('lang-en');
            if (lang === 'tw') {
                btnTw.className = 'px-4 py-1.5 text-xs font-bold rounded-lg transition-all bg-blue-600 text-white shadow-lg';
                btnEn.className = 'px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200';
            } else {
                btnEn.className = 'px-4 py-1.5 text-xs font-bold rounded-lg transition-all bg-blue-600 text-white shadow-lg';
                btnTw.className = 'px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200';
            }

            // 更新靜態文字
            const dict = i18n[lang];
            const updates = [
                { id: 'ui-title', key: 'title' },
                { id: 'ui-desc', key: 'desc' },
                { id: 'ui-loading', key: 'loading' },
                { id: 'ui-reset', key: 'reset' },
                { id: 'ui-status-label-top', key: 'statusLabelTop' },
                { id: 'ui-unit-top', key: 'unitTop' },
                { id: 'ui-status-label-bottom', key: 'statusLabelBottom' },
                { id: 'ui-unit-bottom', key: 'unitBottom' },
                { id: 'ui-expand', key: 'expand' }
            ];
            updates.forEach(u => {
                const el = document.getElementById(u.id);
                if (el) el.innerText = dict[u.key];
            });

            // 重新渲染動態組件
            renderFilterUI();
            if (!document.getElementById('results-area').classList.contains('hidden')) {
                renderResults();
            }
        }

        function loadDataFromURL() {
            Papa.parse(DATA_SOURCE_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allData = results.data;
                    const loadingMsg = document.getElementById('loading-msg');
                    if (loadingMsg) loadingMsg.style.display = 'none';
                    initFilterUI(); 
                    updateLogic();  
                    renderFilterUI(); 
                },
                error: function(err) {
                    document.getElementById('filters-container').innerHTML = 
                        `<div class="text-red-400 text-center p-4 bg-red-900/20 rounded-2xl border border-red-500/30">
                            <strong>Data Load Failed!</strong><br>
                            ${err.message || 'Check your URL or CORS settings.'}
                        </div>`;
                }
            });
        }

        function initFilterUI() {
            const container = document.getElementById('filters-container');
            if (!container) return;
            container.innerHTML = ''; 

            CATEGORIES.forEach(cat => {
                const rowDiv = document.createElement('div');
                rowDiv.id = `cat-row-${cat.key}`;
                rowDiv.className = 'hidden flex-col items-start w-full py-4 border-b border-white/5 last:border-0';

                if (cat.type === 'toggle') {
                    const toggleBtn = document.createElement('button');
                    toggleBtn.id = `cat-toggle-${cat.key}`;
                    toggleBtn.onclick = () => {
                        if (selectedFilters[cat.key]) delete selectedFilters[cat.key];
                        else selectedFilters[cat.key] = cat.toggleValue;
                        updateLogic();
                        renderFilterUI();
                    };
                    rowDiv.appendChild(toggleBtn);
                } else {
                    const headerBtn = document.createElement('button');
                    headerBtn.id = `cat-header-${cat.key}`;
                    headerBtn.onclick = () => {
                        if (expandedCategories.has(cat.key)) {
                            expandedCategories.delete(cat.key);
                            delete selectedFilters[cat.key];
                            if (cat.key === 'Wattage_W') selectedWattageRange = null;
                            if (cat.key === 'Input_Voltage_Group') {
                                selectedInputVoltage1 = null;
                                delete selectedFilters['Input_Voltage_2'];
                            }
                        } else {
                            expandedCategories.add(cat.key);
                        }
                        updateLogic();
                        renderFilterUI();
                    };
                    rowDiv.appendChild(headerBtn);

                    const optionsDiv = document.createElement('div');
                    optionsDiv.id = `cat-options-${cat.key}`;
                    optionsDiv.className = `options-container flex flex-row flex-wrap items-center gap-2.5 w-full`;
                    rowDiv.appendChild(optionsDiv);
                }
                container.appendChild(rowDiv);
            });
            lucide.createIcons();
        }

        function renderFilterUI() {
            const lang = i18n[currentLang];

            CATEGORIES.forEach(cat => {
                const rowDiv = document.getElementById(`cat-row-${cat.key}`);
                if (!rowDiv) return;
                const catLabel = lang[`cat_${cat.key}`];

                if (cat.type === 'toggle') {
                    let temp = getTempFiltered([cat.key]);
                    let hasValidItems = temp.some(item => item[cat.key] === cat.toggleValue);
                    let isSelected = selectedFilters[cat.key] === cat.toggleValue;

                    if (temp.length >= 20 || !hasValidItems) {
                        rowDiv.classList.add('hidden');
                        rowDiv.classList.remove('flex');
                        return; 
                    }
                    rowDiv.classList.remove('hidden');
                    rowDiv.classList.add('flex');

                    const toggleBtn = document.getElementById(`cat-toggle-${cat.key}`);
                    if (toggleBtn) {
                        const activeClass = 'bg-blue-600 border-blue-500 text-white shadow-lg';
                        const inactiveClass = 'bg-white/5 border-white/10 text-slate-400 hover:bg-white/10 hover:border-blue-500/50';
                        toggleBtn.className = `shrink-0 px-5 py-2.5 rounded-xl font-bold text-sm transition-all border flex items-center gap-2 ${isSelected ? activeClass : inactiveClass}`;
                        toggleBtn.innerHTML = `<i data-lucide="${cat.icon}" class="w-4 h-4"></i> ${isSelected ? `✓ ${catLabel}` : catLabel}`;
                    }
                    return; 
                }

                let availableOptions = [];
                let l2Options = [];
                if (cat.type === 'group_2_levels') {
                    let temp = getTempFiltered(['Input_Voltage_Group']); 
                    l2Options = [...new Set(temp.map(i => i['Input_Voltage']).filter(v => v))];
                    if (l2Options.length === 0) {
                        rowDiv.classList.add('hidden');
                        rowDiv.classList.remove('flex');
                        return;
                    }
                } else {
                    availableOptions = getAvailableOptionsForCategory(cat.key);
                    if (availableOptions.length === 0) {
                        rowDiv.classList.add('hidden');
                        rowDiv.classList.remove('flex');
                        return;
                    }
                }

                rowDiv.classList.remove('hidden');
                rowDiv.classList.add('flex');

                const isExpanded = expandedCategories.has(cat.key);
                const isSelected = selectedFilters[cat.key] !== undefined || 
                                   (cat.key === 'Wattage_W' && selectedWattageRange !== null) ||
                                   (cat.key === 'Input_Voltage_Group' && (selectedInputVoltage1 !== null || selectedFilters['Input_Voltage_2'] !== undefined));

                const headerBtn = document.getElementById(`cat-header-${cat.key}`);
                if (headerBtn) {
                    headerBtn.className = `shrink-0 px-5 py-2.5 rounded-xl font-semibold text-sm transition-all border flex items-center gap-2 ${
                        isExpanded || isSelected ? 'bg-white/10 border-white/20 text-white' : 'bg-transparent border-transparent text-slate-500 hover:text-slate-200'
                    }`;
                    headerBtn.innerHTML = `<i data-lucide="${cat.icon}" class="w-4 h-4 ${isSelected ? 'text-blue-400' : ''}"></i> ${catLabel}`;
                }

                const optionsDiv = document.getElementById(`cat-options-${cat.key}`);
                if (optionsDiv) {
                    optionsDiv.className = `options-container flex flex-row flex-wrap items-center gap-2.5 w-full ${isExpanded || isSelected ? 'expanded' : ''}`;
                    optionsDiv.innerHTML = '';

                    if (cat.type === 'group_2_levels') {
                        let temp = getTempFiltered(['Input_Voltage_Group']); 
                        l2Options.forEach(opt => {
                            const isActive = selectedInputVoltage1 === opt;
                            const btn = document.createElement('button');
                            btn.className = `shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition-all border ${
                                isActive ? 'bg-teal-500/20 border-teal-400/50 text-teal-300' : 'bg-white/5 border-white/10 text-slate-300 hover:bg-white/10'
                            }`;
                            btn.innerText = opt;
                            btn.onclick = () => {
                                if (isActive) {
                                    selectedInputVoltage1 = null;
                                    delete selectedFilters['Input_Voltage_2'];
                                } else {
                                    selectedInputVoltage1 = opt;
                                    delete selectedFilters['Input_Voltage_2'];
                                    expandedCategories.add(cat.key);
                                    let matchingL3 = temp.filter(i => i['Input_Voltage'] === opt).map(i => i['Input_Voltage_2']).filter(v => v);
                                    let uniqueL3 = [...new Set(matchingL3)];
                                    if (uniqueL3.length === 1) selectedFilters['Input_Voltage_2'] = uniqueL3[0];
                                }
                                updateLogic();
                                renderFilterUI();
                            };
                            optionsDiv.appendChild(btn);
                        });

                        if (selectedInputVoltage1) {
                            const separator = document.createElement('span');
                            separator.className = 'text-slate-500 mx-1 text-sm font-bold';
                            separator.innerText = '>';
                            optionsDiv.appendChild(separator);

                            let l3Options = [...new Set(temp.filter(i => i['Input_Voltage'] === selectedInputVoltage1).map(i => i['Input_Voltage_2']).filter(v => v))];
                            l3Options.forEach(opt => {
                                const isActive = selectedFilters['Input_Voltage_2'] === opt;
                                const btn = document.createElement('button');
                                btn.className = `shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition-all border ${
                                    isActive ? 'bg-blue-500/20 border-blue-500/50 text-blue-300' : 'bg-white/5 border-white/10 text-slate-300 hover:bg-white/10'
                                }`;
                                btn.innerText = opt;
                                btn.onclick = () => {
                                    if (isActive) delete selectedFilters['Input_Voltage_2'];
                                    else selectedFilters['Input_Voltage_2'] = opt;
                                    updateLogic();
                                    renderFilterUI();
                                };
                                optionsDiv.appendChild(btn);
                            });
                        }
                    } 
                    else if (cat.key === 'Wattage_W') {
                        WATTAGE_RANGES.forEach(range => {
                            let hasData = availableOptions.some(opt => {
                                let w = parseInt(opt) || 0;
                                return w >= range.min && w <= range.max;
                            });
                            if (!hasData && selectedWattageRange !== range.id) return;

                            const isRangeActive = selectedWattageRange === range.id;
                            const rangeBtn = document.createElement('button');
                            rangeBtn.className = `shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition-all border ${
                                isRangeActive ? 'bg-blue-600/20 border-blue-500 text-blue-300 shadow-md' : 'bg-white/5 border-white/10 text-slate-300 hover:bg-white/10'
                            }`;
                            rangeBtn.innerText = range.label;
                            rangeBtn.onclick = () => {
                                if (isRangeActive) {
                                    selectedWattageRange = null;
                                    delete selectedFilters['Wattage_W'];
                                } else {
                                    selectedWattageRange = range.id;
                                    delete selectedFilters['Wattage_W'];
                                    expandedCategories.add('Wattage_W');
                                }
                                updateLogic();
                                renderFilterUI();
                            };
                            optionsDiv.appendChild(rangeBtn);
                        });

                        if (selectedWattageRange) {
                            const separator = document.createElement('span');
                            separator.className = 'text-slate-500 mx-1 text-sm font-bold';
                            separator.innerText = '>';
                            optionsDiv.appendChild(separator);

                            let activeRangeDef = WATTAGE_RANGES.find(r => r.id === selectedWattageRange);
                            let exactOptions = availableOptions.filter(opt => {
                                let w = parseInt(opt) || 0;
                                return w >= activeRangeDef.min && w <= activeRangeDef.max;
                            });

                            exactOptions.forEach(opt => {
                                const isActive = selectedFilters[cat.key] === opt;
                                const optBtn = document.createElement('button');
                                optBtn.className = `shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition-all border ${
                                    isActive ? 'bg-blue-600 border-blue-500 text-white shadow-md' : 'bg-white/5 border-white/10 text-slate-300 hover:bg-white/10'
                                }`;
                                optBtn.innerText = opt + ' W';
                                optBtn.onclick = () => {
                                    if (isActive) delete selectedFilters[cat.key];
                                    else selectedFilters[cat.key] = opt;
                                    updateLogic();
                                    renderFilterUI();
                                };
                                optionsDiv.appendChild(optBtn);
                            });
                        }
                    } 
                    else {
                        availableOptions.forEach(opt => {
                            const isActive = selectedFilters[cat.key] === opt;
                            const optBtn = document.createElement('button');
                            optBtn.className = `shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition-all border ${
                                isActive ? 'bg-blue-600 border-blue-500 text-white shadow-md' : 'bg-white/5 border-white/10 text-slate-300 hover:bg-white/10'
                            }`;
                            optBtn.innerText = opt;
                            optBtn.onclick = () => {
                                if (isActive) delete selectedFilters[cat.key];
                                else selectedFilters[cat.key] = opt;
                                updateLogic();
                                renderFilterUI();
                            };
                            optionsDiv.appendChild(optBtn);
                        });
                    }
                }
            });
            lucide.createIcons();
        }

        function updateLogic() {
            let tempBaseForToggle = getTempFiltered(['Price_Positioning']);
            let hasValidToggle = tempBaseForToggle.some(i => i['Price_Positioning'] === 'V');
            if (tempBaseForToggle.length >= 20 || !hasValidToggle) {
                delete selectedFilters['Price_Positioning'];
            }
            filteredData = getTempFiltered();
            filteredData.sort((a, b) => (parseInt(b.Wattage_W) || 0) - (parseInt(a.Wattage_W) || 0));
            checkDisplayRules();
        }

        function getTempFiltered(ignoreKeys = []) {
            return allData.filter(item => {
                for (let key in selectedFilters) {
                    if (!ignoreKeys.includes(key) && item[key] !== selectedFilters[key]) return false;
                }
                if (selectedWattageRange && !ignoreKeys.includes('Wattage_W') && !selectedFilters['Wattage_W']) {
                    let w = parseInt(item['Wattage_W']) || 0;
                    let r = WATTAGE_RANGES.find(x => x.id === selectedWattageRange);
                    if (r && (w < r.min || w > r.max)) return false;
                }
                if (selectedInputVoltage1 && !ignoreKeys.includes('Input_Voltage_Group') && !selectedFilters['Input_Voltage_2']) {
                    if (item['Input_Voltage'] !== selectedInputVoltage1) return false;
                }
                return true;
            });
        }

        function getAvailableOptionsForCategory(categoryKey) {
            let tempFiltered = getTempFiltered([categoryKey]);
            let options = [...new Set(tempFiltered.map(item => item[categoryKey]).filter(val => val && val.trim() !== ''))];
            if (categoryKey === 'Wattage_W') options.sort((a, b) => parseInt(a) - parseInt(b));
            else options.sort();
            return options;
        }

        function checkDisplayRules() {
            const resultsArea = document.getElementById('results-area');
            const showBtn = document.getElementById('show-results-btn');
            const statusTextTop = document.getElementById('status-text-top');
            const statusTextBottom = document.getElementById('status-text-bottom');
            const resultCountTop = document.getElementById('result-count-top');
            const resultCountBottom = document.getElementById('result-count-bottom');
            
            const count = filteredData.length;
            let filterCount = Object.keys(selectedFilters).length;
            if (selectedWattageRange && !selectedFilters['Wattage_W']) filterCount++;
            if (selectedInputVoltage1 && !selectedFilters['Input_Voltage_2']) filterCount++;

            if (count > 51) {
                if (statusTextTop) statusTextTop.classList.add('hidden');
                if (statusTextBottom) statusTextBottom.classList.add('hidden');
            } else {
                if (statusTextTop) statusTextTop.classList.remove('hidden');
                if (statusTextBottom) statusTextBottom.classList.remove('hidden');
                if (resultCountTop) resultCountTop.innerText = count;
                if (resultCountBottom) resultCountBottom.innerText = count;
            }

            if (resultsArea) resultsArea.classList.add('hidden');
            if (showBtn) showBtn.classList.add('hidden');

            if (count === 0 && filterCount > 0) {
                if (resultsArea) resultsArea.classList.remove('hidden');
                renderResults();
            } else if (count < 16 && count > 0) {
                if (resultsArea) resultsArea.classList.remove('hidden');
                renderResults();
            } else if (filterCount >= 4) { 
                if (showBtn) showBtn.classList.remove('hidden');
            }
        }

        function renderResults() {
            const container = document.getElementById('results-area');
            if (!container) return;
            container.innerHTML = '';
            const lang = i18n[currentLang];

            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 flex flex-col items-center justify-center glass-panel rounded-3xl text-slate-500">
                        <i data-lucide="shield-alert" class="w-16 h-16 mb-4 opacity-50 text-blue-400"></i>
                        <p class="text-xl font-medium">${lang.noResult}</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            filteredData.forEach(item => {
                const card = document.createElement('div');
                const isHighCP = item.Price_Positioning === 'V';
                const baseClass = 'bg-white/5 backdrop-blur-xl transition-all duration-300 hover:bg-white/10 hover:-translate-y-1';
                const borderClass = isHighCP 
                    ? 'border-2 border-blue-500 shadow-[0_0_20px_rgba(59,130,246,0.3)]' 
                    : 'border border-white/10 shadow-2xl';
                
                card.className = `relative rounded-3xl p-6 flex flex-col h-full overflow-hidden ${baseClass} ${borderClass}`;
                
                let ribbonHTML = isHighCP ? `<div class="absolute top-0 right-0"><div class="bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded-bl-2xl shadow-lg flex items-center gap-1.5 uppercase tracking-widest"><i data-lucide="award" class="w-3.5 h-3.5"></i> ${lang.cp_badge}</div></div>` : '';

                card.innerHTML = `
                    ${ribbonHTML}
                    <div class="mb-5 pr-20">
                        <div class="inline-block px-2.5 py-1 bg-white/10 text-blue-300 text-[10px] font-bold tracking-wider rounded-lg border border-white/5 uppercase mb-3">
                            ${item.Form_Factor || 'UNK'}
                        </div>
                        <h3 class="text-xl font-bold text-white leading-tight mb-1">${item.Model_Name}</h3>
                        <p class="text-xs text-slate-500 font-medium">${item.ATX_Version || 'SPEC_UNDEF'}</p>
                    </div>
                    
                    <div class="flex items-center justify-between mb-6 pb-6 border-b border-white/5">
                        <div class="flex items-baseline">
                            <span class="text-5xl font-black text-white tracking-tighter">${item.Wattage_W}</span>
                            <span class="text-blue-400 font-bold text-xl ml-1">W</span>
                        </div>
                        <div class="text-right flex flex-col items-end">
                            <div class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mb-1">${lang.label_efficiency}</div>
                            <div class="px-3 py-1 bg-blue-500/20 text-blue-300 rounded-lg font-black text-xs border border-blue-500/30 tracking-wide">
                                ${item.Efficiency_Level || '-'}
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="flex flex-col items-center justify-center p-3 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition-colors text-center">
                            <i data-lucide="cable" class="w-4 h-4 text-blue-400 mb-1.5"></i>
                            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-wider mb-0.5">${lang.label_modular}</span>
                            <span class="text-sm font-semibold text-slate-200 truncate w-full px-1">${item.Modular_Type || '-'}</span>
                        </div>
                        <div class="flex flex-col items-center justify-center p-3 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition-colors text-center">
                            <i data-lucide="cpu" class="w-4 h-4 text-blue-400 mb-1.5"></i>
                            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-wider mb-0.5">${lang.label_ports}</span>
                            <span class="text-sm font-semibold text-slate-200">${item['12V_2x6_Ports'] > 0 ? item['12V_2x6_Ports'] + lang.val_unit_ports : lang.val_none}</span>
                        </div>
                        <div class="flex flex-col items-center justify-center p-3 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition-colors text-center">
                            <i data-lucide="plug" class="w-4 h-4 text-blue-400 mb-1.5"></i>
                            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-wider mb-0.5">${lang.label_voltage}</span>
                            <span class="text-sm font-semibold text-slate-200">${item.Input_Voltage_2 || '-'}</span>
                        </div>
                        <div class="flex flex-col items-center justify-center p-3 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition-colors text-center">
                            <div class="flex gap-2 mb-1.5"><i data-lucide="thermometer" class="w-4 h-4 text-blue-400"></i><i data-lucide="mountain" class="w-4 h-4 text-blue-400"></i></div>
                            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-wider mb-0.5">${lang.label_env}</span>
                            <span class="text-xs font-semibold text-slate-200 leading-tight">${item.Working_Temp || '-'}<br>${item.Operating_Altitude || '-'}</span>
                        </div>
                    </div>

                    <div class="mt-auto flex items-center gap-2 text-[10px] text-slate-500 bg-black/20 p-2.5 rounded-xl border border-white/5">
                        <i data-lucide="layout-template" class="w-3.5 h-3.5 text-blue-500"></i>
                        <div>
                            <span class="font-bold text-slate-400 uppercase tracking-tight">${lang.label_dimensions}:</span> 
                            <span class="text-slate-200 font-medium ml-1">${item.Dimension_2 || '-'} mm</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }
    </script>
</body>
</html>
