<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC 電源供應器選購助手 | Visualized Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            background-color: #f8fafc;
            color: #334155;
        }
        
        .glass-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .options-container {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out, margin-top 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            margin-top: 0;
        }
        .options-container.expanded {
            max-height: 800px;
            opacity: 1;
            margin-top: 0.75rem;
            overflow: visible;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 80 PLUS 金屬光澤標章特效 */
        .badge-titanium { background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 50%, #94a3b8 100%); color: #0f172a; border: 1px solid #e2e8f0; }
        .badge-platinum { background: linear-gradient(135deg, #f0f9ff 0%, #bae6fd 50%, #38bdf8 100%); color: #082f49; border: 1px solid #e0f2fe; }
        .badge-gold { background: linear-gradient(135deg, #fefce8 0%, #fde047 50%, #eab308 100%); color: #713f12; border: 1px solid #fef08a; }
        .badge-silver { background: linear-gradient(135deg, #ffffff 0%, #e5e7eb 50%, #d1d5db 100%); color: #1f2937; border: 1px solid #f3f4f6; }
        .badge-bronze { background: linear-gradient(135deg, #ffedd5 0%, #fdba74 50%, #f97316 100%); color: #7c2d12; border: 1px solid #fed7aa; }
        .badge-standard { background: #f8fafc; color: #475569; border: 1px solid #cbd5e1; }
    </style>
</head>
<body class="font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center md:text-left">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div class="flex-grow">
                    <h1 id="ui-title" class="text-3xl font-extrabold text-slate-900 mb-2 tracking-tight">
                        PC 電源供應器選購助手
                    </h1>
                    <p id="ui-desc" class="text-slate-500">點擊類別展開選項，系統將為您即時篩選合適的電源。</p>
                    
                    <div id="status-text-top" class="text-sm font-medium text-blue-700 mt-3 hidden px-4 py-1.5 rounded-full bg-blue-50 border border-blue-100 inline-block shadow-sm">
                        <span id="ui-status-label-top">目前符合條件：</span><span id="result-count-top" class="font-bold text-lg text-blue-800 ml-1">0</span> <span id="ui-unit-top">款</span>
                    </div>
                </div>

                <div class="flex flex-col items-end gap-3 z-10">
                    <div class="flex items-center gap-3">
                        <div class="flex bg-slate-200 p-1 rounded-lg shadow-inner">
                            <button onclick="changeLang('tw')" id="lang-tw" class="px-4 py-1.5 text-xs font-bold rounded-md transition-all bg-white text-slate-900 shadow-sm">TW</button>
                            <button onclick="changeLang('en')" id="lang-en" class="px-4 py-1.5 text-xs font-bold rounded-md transition-all text-slate-500 hover:text-slate-700">EN</button>
                        </div>
                        
                        <button id="reset-btn" class="hidden px-4 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 text-xs font-bold rounded-lg border border-red-200 transition-all flex items-center gap-1.5 shadow-sm">
                            <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> <span id="ui-reset">重新選取</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div id="filters-container" class="glass-panel rounded-2xl shadow-sm p-6 md:p-8 mb-8 min-h-[150px] relative">
            <div id="loading-msg" class="absolute inset-0 flex items-center justify-center text-blue-600 animate-pulse font-medium">
                <i data-lucide="loader-2" class="w-5 h-5 mr-2 animate-spin"></i> <span id="ui-loading">正在載入雲端資料庫...</span>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 min-h-[40px] gap-4">
            <div id="status-text-bottom" class="text-sm font-medium text-slate-500 hidden">
                <span id="ui-status-label-bottom">為您篩選出</span> <span id="result-count-bottom" class="text-blue-600 font-bold text-lg">0</span> <span id="ui-unit-bottom">款電源</span>
            </div>
            <button id="show-results-btn" class="hidden px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all border border-transparent shadow-md ml-auto flex items-center gap-2">
                <i data-lucide="zap" class="w-5 h-5"></i> <span id="ui-expand">展開篩選結果</span>
            </button>
        </div>

        <div id="results-area" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-6 pb-8">
            </div>

        <div id="bottom-inquiry-container" class="hidden pb-20 pt-8 border-t border-slate-200 mt-4 flex flex-col items-center">
            <p id="ui-inquiry-hint" class="text-sm text-slate-500 mb-3">以上都不符合您的系統需求？</p>
            <button onclick="openInquiryModal()" class="px-6 py-2.5 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl transition-all shadow-md flex items-center gap-2 text-sm">
                <i data-lucide="mail-plus" class="w-4 h-4"></i> <span id="ui-inquiry-btn">告訴我們您的特殊需求</span>
            </button>
        </div>
    </div>

    <div id="inquiry-modal" class="fixed inset-0 z-50 hidden bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 transition-opacity opacity-0">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform scale-95 transition-transform duration-300" id="inquiry-modal-content">
            <div class="flex justify-between items-center px-6 py-4 border-b border-slate-100 bg-slate-50">
                <h2 id="ui-modal-title" class="text-lg font-extrabold text-slate-800">向 PM 提出客製化需求</h2>
                <button onclick="closeInquiryModal()" class="text-slate-400 hover:text-slate-600 transition-colors p-1">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto max-h-[70vh]">
                <div class="mb-5 p-4 bg-blue-50 border border-blue-100 rounded-xl">
                    <h3 id="ui-modal-specs-title" class="text-xs font-bold text-blue-800 uppercase tracking-wider mb-2">您目前尋找的規格：</h3>
                    <p id="inq-specs-text" class="text-sm text-blue-900 leading-relaxed font-medium whitespace-pre-wrap"></p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label id="ui-modal-name" class="block text-sm font-bold text-slate-700 mb-1">客戶名稱 <span class="text-red-500">*</span></label>
                        <input type="text" id="inq-name" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label id="ui-modal-annual" class="block text-sm font-bold text-slate-700 mb-1">年需求數量 <span class="text-red-500">*</span></label>
                            <input type="number" id="inq-annual" min="0" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow">
                        </div>
                        <div>
                            <label id="ui-modal-monthly" class="block text-sm font-bold text-slate-700 mb-1">月需求數量 <span class="text-red-500">*</span></label>
                            <input type="number" id="inq-monthly" min="0" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow">
                        </div>
                    </div>
                    <div>
                        <label id="ui-modal-leadtime" class="block text-sm font-bold text-slate-700 mb-2">交期與狀態 <span class="text-red-500">*</span></label>
                        <div class="flex flex-col gap-2.5">
                            <label class="flex items-center gap-2.5 text-sm text-slate-700 cursor-pointer p-2 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">
                                <input type="radio" name="inq-leadtime" value="A" class="w-4 h-4 text-blue-600 focus:ring-blue-500 border-slate-300">
                                <span id="ui-modal-npi">可等待新產品開發</span>
                            </label>
                            <label class="flex items-center gap-2.5 text-sm text-slate-700 cursor-pointer p-2 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">
                                <input type="radio" name="inq-leadtime" value="B" class="w-4 h-4 text-blue-600 focus:ring-blue-500 border-slate-300">
                                <span id="ui-modal-mp">需量產機型立即出貨</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label id="ui-modal-notes" class="block text-sm font-bold text-slate-700 mb-1">特別要求 / 其他</label>
                        <textarea id="inq-notes" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none transition-shadow" placeholder="請簡述您的應用場景或特殊認證需求..."></textarea>
                    </div>
                </div>
            </div>
            
            <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button onclick="closeInquiryModal()" id="ui-modal-cancel" class="px-5 py-2 text-sm font-bold text-slate-600 hover:text-slate-800 transition-colors">
                    取消
                </button>
                <button onclick="submitInquiry()" id="ui-modal-submit" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-lg shadow-md transition-colors flex items-center gap-2">
                    <i data-lucide="send" class="w-4 h-4"></i> 發送給 PM
                </button>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            tw: {
                title: "PC 電源供應器選購助手",
                desc: "點擊類別展開選項，系統將為您即時篩選合適的電源。",
                loading: "正在載入雲端資料庫...",
                reset: "重新選取",
                statusLabelTop: "目前符合條件：",
                unitTop: "款",
                statusLabelBottom: "為您篩選出",
                unitBottom: "款電源",
                expand: "展開篩選結果",
                noResult: "查無符合條件的電源供應器",
                cat_Form_Factor: "電源尺寸 (Form Factor)",
                cat_ATX_Version: "ATX 規範版本",

                label_modular: "線材設計",
                label_ports: "12V-2x6 接頭",

                label_env: "環境耐受",
                label_dimensions: "產品尺寸 (L*W*H)",
                cp_badge: "C/P 值之王",
                unit_ports: "組",
                val_none: "無",
                // 表單與新按鈕翻譯
                inquiry_hint: "以上都不符合您的系統需求？",
                inquiry_btn: "告訴我們您的特殊需求",
                inquiry_btn_empty: "找不到合適規格？向 PM 提出客製化需求",
                modal_title: "向 PM 提出客製化需求",
                modal_specs_title: "您目前尋找的規格：",
                modal_name: "客戶名稱 *",
                modal_annual: "年需求數量 *",
                modal_monthly: "月需求數量 *",
                modal_leadtime: "交期與狀態 *",
                modal_npi: "可等待新產品開發",
                modal_mp: "需量產機型立即出貨",
                modal_notes: "特別要求 / 其他",
                modal_cancel: "取消",
                modal_submit: "發送給 PM",
                alert_required: "請填寫所有標示 * 的必填欄位。"
            },
            en: {
                title: "PC PSU Selector",
                desc: "Select categories to instantly filter the perfect power supply for your build.",
                loading: "Loading database...",
                reset: "Reset Selection",
                statusLabelTop: "Units Found: ",
                unitTop: "",
                statusLabelBottom: "Filtered ",
                unitBottom: " PSUs for you",
                expand: "Expand Results",
                noResult: "No matching power supplies found.",
                cat_Form_Factor: "Form Factor",
                cat_ATX_Version: "ATX Version",
                cat_Wattage_W: "Rated Wattage (W)",
                cat_Efficiency_Level: "Efficiency (80 PLUS)",
                cat_Modular_Type: "Modular Type",
                cat_Input_Voltage_Group: "Input Voltage",
                cat_Operating_Altitude: "Operating Altitude",
                cat_Working_Temp: "Working Temp",
                cat_12V_2x6_Ports: "12V-2x6 Ports",
                cat_Price_Positioning: "High C/P Units",
                label_efficiency: "Efficiency",
                label_modular: "Modular",
                label_ports: "12V-2x6",
                label_voltage: "Input Voltage",
                label_env: "Env. Tolerance",
                label_dimensions: "Dimensions (L*W*H)",
                cp_badge: "Best C/P",
                unit_ports: " Port(s)",
                val_none: "None",
                // 表單與新按鈕翻譯
                inquiry_hint: "None of the above fit your requirements?",
                inquiry_btn: "Tell us your specific needs",
                inquiry_btn_empty: "No matches? Request customization from PM",
                modal_title: "Customization Request",
                modal_specs_title: "Your Targeted Specs:",
                modal_name: "Customer Name *",
                modal_annual: "Annual Demand *",
                modal_monthly: "Monthly Demand *",
                modal_leadtime: "Lead Time & Status *",
                modal_npi: "Can wait for new product development",
                modal_mp: "Need mass production model immediately",
                modal_notes: "Special Requirements / Others",
                modal_cancel: "Cancel",
                modal_submit: "Send to PM",
                alert_required: "Please fill in all required fields marked with *."
            }
        };

        let currentLang = 'tw'; 

        const DATA_SOURCE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZx7dFscS4QzuHlmZTJrYCqXTtSIf4vR-aqr4dIai7cTLfycA1MQA85Q09dj3jXUwwNCdwYn9nFNuL/pub?output=csv';

        let allData = [];            
        let filteredData = [];       
        let selectedFilters = {};    
        let expandedCategories = new Set(); 
        let selectedWattageRange = null; 
        let selectedInputVoltage1 = null; 

        const WATTAGE_RANGES = [
            { id: 'low', label: '<= 500W', min: 0, max: 500 },
            { id: 'mid', label: '501W - 1000W', min: 501, max: 1000 },
            { id: 'high', label: '> 1000W', min: 1001, max: 99999 }
        ];

        const CATEGORIES = [
            { key: 'Form_Factor', icon: 'box' },
            { key: 'ATX_Version', icon: 'file-text' },
            { key: 'Wattage_W', icon: 'battery-charging' },
            { key: 'Efficiency_Level', icon: 'award' },
            { key: 'Modular_Type', icon: 'cable' },
            { key: 'Input_Voltage_Group', type: 'group_2_levels', icon: 'plug' }, 
            { key: 'Operating_Altitude', icon: 'mountain' },
            { key: 'Working_Temp', icon: 'thermometer' },
            { key: '12V_2x6_Ports', icon: 'cpu' },
            { key: 'Price_Positioning', type: 'toggle', toggleValue: 'V', icon: 'flame' } 
        ];

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadDataFromURL();

            document.getElementById('show-results-btn').addEventListener('click', () => {
                document.getElementById('results-area').classList.remove('hidden');
                document.getElementById('show-results-btn').classList.add('hidden');
                renderResults(); 
            });

            document.getElementById('reset-btn').addEventListener('click', () => {
                selectedFilters = {};
                expandedCategories = new Set();
                selectedWattageRange = null;
                selectedInputVoltage1 = null;
                updateLogic();
                renderFilterUI();
            });
        });

        function changeLang(lang) {
            currentLang = lang;
            const btnTw = document.getElementById('lang-tw');
            const btnEn = document.getElementById('lang-en');
            if (lang === 'tw') {
                btnTw.className = 'px-4 py-1.5 text-xs font-bold rounded-md transition-all bg-white text-slate-900 shadow-sm';
                btnEn.className = 'px-4 py-1.5 text-xs font-bold rounded-md transition-all text-slate-500 hover:text-slate-700';
            } else {
                btnEn.className = 'px-4 py-1.5 text-xs font-bold rounded-md transition-all bg-white text-slate-900 shadow-sm';
                btnTw.className = 'px-4 py-1.5 text-xs font-bold rounded-md transition-all text-slate-500 hover:text-slate-700';
            }
            
            // 更新靜態文字
            const textUpdates = [
                { id: 'ui-title', key: 'title' }, { id: 'ui-desc', key: 'desc' }, { id: 'ui-loading', key: 'loading' },
                { id: 'ui-reset', key: 'reset' }, { id: 'ui-status-label-top', key: 'statusLabelTop' },
                { id: 'ui-unit-top', key: 'unitTop' }, { id: 'ui-status-label-bottom', key: 'statusLabelBottom' },
                { id: 'ui-unit-bottom', key: 'unitBottom' }, { id: 'ui-expand', key: 'expand' },
                // 表單與新按鈕
                { id: 'ui-inquiry-hint', key: 'inquiry_hint'}, { id: 'ui-inquiry-btn', key: 'inquiry_btn'},
                { id: 'ui-modal-title', key: 'modal_title'}, { id: 'ui-modal-specs-title', key: 'modal_specs_title'},
                { id: 'ui-modal-name', key: 'modal_name'}, { id: 'ui-modal-annual', key: 'modal_annual'},
                { id: 'ui-modal-monthly', key: 'modal_monthly'}, { id: 'ui-modal-leadtime', key: 'modal_leadtime'},
                { id: 'ui-modal-npi', key: 'modal_npi'}, { id: 'ui-modal-mp', key: 'modal_mp'},
                { id: 'ui-modal-notes', key: 'modal_notes'}, { id: 'ui-modal-cancel', key: 'modal_cancel'},
                { id: 'ui-modal-submit', key: 'modal_submit'}
            ];
            textUpdates.forEach(item => {
                const el = document.getElementById(item.id);
                if (el) {
                    if (item.key.includes('modal_name') || item.key.includes('annual') || item.key.includes('monthly') || item.key.includes('leadtime')) {
                        el.innerHTML = i18n[lang][item.key].replace('*', '<span class="text-red-500">*</span>');
                    } else {
                        el.innerText = i18n[lang][item.key];
                    }
                }
            });
            
            // 空狀態的按鈕需要重繪 Results
            renderFilterUI();
            if (!document.getElementById('results-area').classList.contains('hidden')) renderResults();
        }

        // =========================
        // 表單視窗 Modal 邏輯
        // =========================
        function openInquiryModal() {
            const modal = document.getElementById('inquiry-modal');
            const content = document.getElementById('inquiry-modal-content');
            
            // 抓取並整理目前的使用者選項
            let specs = [];
            const lang = i18n[currentLang];
            
            for(let key in selectedFilters) {
                let catLabel = lang['cat_' + key] || key;
                let val = selectedFilters[key] === 'V' ? 'Yes' : selectedFilters[key];
                specs.push(`[${catLabel}] ${val}`);
            }
            if (selectedWattageRange && !selectedFilters['Wattage_W']) {
                let r = WATTAGE_RANGES.find(x => x.id === selectedWattageRange);
                if (r) specs.push(`[${lang['cat_Wattage_W']}] ${r.label}`);
            }
            if (selectedInputVoltage1 && !selectedFilters['Input_Voltage_2']) {
                specs.push(`[${lang['cat_Input_Voltage_Group']}] ${selectedInputVoltage1}`);
            }
            
            const specsText = specs.length > 0 ? specs.join('\n') : (currentLang === 'tw' ? "未指定條件" : "No specific conditions");
            document.getElementById('inq-specs-text').innerText = specsText;

            // 顯示動畫
            modal.classList.remove('hidden');
            // setTimeout allow browser to render block before fading in
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function closeInquiryModal() {
            const modal = document.getElementById('inquiry-modal');
            const content = document.getElementById('inquiry-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); // 對應 Tailwind 的 duration-300
        }

        function submitInquiry() {
            const lang = i18n[currentLang];
            
            // 取得欄位值
            const name = document.getElementById('inq-name').value.trim();
            const annual = document.getElementById('inq-annual').value.trim();
            const monthly = document.getElementById('inq-monthly').value.trim();
            const leadtimeObj = document.querySelector('input[name="inq-leadtime"]:checked');
            const notes = document.getElementById('inq-notes').value.trim();

            // 驗證必填
            if(!name || !annual || !monthly || !leadtimeObj) {
                alert(lang.alert_required);
                return;
            }

            const leadtimeVal = leadtimeObj.value === 'A' ? lang.modal_npi : lang.modal_mp;
            const filterText = document.getElementById('inq-specs-text').innerText;

            // 組合信件內容 (適用 mailto)
            const subject = encodeURIComponent("PC PSU 客製化需求詢價");
            const body = encodeURIComponent(
                `【客戶基本資訊】\n` +
                `客戶名稱：${name}\n` +
                `年需求數量：${annual}\n` +
                `月需求數量：${monthly}\n` +
                `交期與狀態：${leadtimeVal}\n\n` +
                `【特別要求/其他】\n` +
                `${notes || '無'}\n\n` +
                `------------------------\n` +
                `【客戶已選取的技術規格參考】\n` +
                `${filterText}`
            );

            // 呼叫本機郵件軟體
            window.location.href = `mailto:hansou@fsp-group.com.tw?subject=${subject}&body=${body}`;
            
            // 清空表單並關閉視窗
            document.getElementById('inq-name').value = '';
            document.getElementById('inq-annual').value = '';
            document.getElementById('inq-monthly').value = '';
            if(leadtimeObj) leadtimeObj.checked = false;
            document.getElementById('inq-notes').value = '';
            closeInquiryModal();
        }
        // =========================

        function loadDataFromURL() {
            Papa.parse(DATA_SOURCE_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allData = results.data;
                    const loadingMsg = document.getElementById('loading-msg');
                    if (loadingMsg) loadingMsg.style.display = 'none';
                    initFilterUI(); 
                    updateLogic();  
                    renderFilterUI(); 
                },
                error: function(err) {
                    const container = document.getElementById('filters-container');
                    if (container) {
                        container.innerHTML = `<div class="text-red-400 text-center p-4 bg-red-900/20 rounded-xl border border-red-500/30"><strong>Data Load Error!</strong><br>${err.message || 'Cannot read CSV file'}</div>`;
                    }
                }
            });
        }

        function initFilterUI() {
            const container = document.getElementById('filters-container');
            if (!container) return;
            container.innerHTML = ''; 
            CATEGORIES.forEach(cat => {
                const rowDiv = document.createElement('div');
                rowDiv.id = `cat-row-${cat.key}`;
                rowDiv.className = 'hidden flex-col items-start w-full py-4 border-b border-slate-100 last:border-0';
                if (cat.type === 'toggle') {
                    const toggleBtn = document.createElement('button');
                    toggleBtn.id = `cat-toggle-${cat.key}`;
                    toggleBtn.onclick = () => {
                        if (selectedFilters[cat.key]) delete selectedFilters[cat.key];
                        else selectedFilters[cat.key] = cat.toggleValue;
                        updateLogic();
                        renderFilterUI();
                    };
                    rowDiv.appendChild(toggleBtn);
                } else {
                    const headerBtn = document.createElement('button');
                    headerBtn.id = `cat-header-${cat.key}`;
                    headerBtn.onclick = () => {
                        if (expandedCategories.has(cat.key)) {
                            expandedCategories.delete(cat.key);
                            delete selectedFilters[cat.key];
                            if (cat.key === 'Wattage_W') selectedWattageRange = null;
                            if (cat.key === 'Input_Voltage_Group') { selectedInputVoltage1 = null; delete selectedFilters['Input_Voltage_2']; }
                        } else {
                            expandedCategories.add(cat.key);
                        }
                        updateLogic();
                        renderFilterUI();
                    };
                    rowDiv.appendChild(headerBtn);
                    const optionsDiv = document.createElement('div');
                    optionsDiv.id = `cat-options-${cat.key}`;
                    optionsDiv.className = `options-container flex flex-row flex-wrap items-center gap-2.5 w-full`;
                    rowDiv.appendChild(optionsDiv);
                }
                container.appendChild(rowDiv);
            });
            lucide.createIcons();
        }

        function renderFilterUI() {
            const lang = i18n[currentLang];
            CATEGORIES.forEach(cat => {
                const rowDiv = document.getElementById(`cat-row-${cat.key}`);
                if (!rowDiv) return;
                const catLabel = lang[`cat_${cat.key}`];
                if (cat.type === 'toggle') {
                    let temp = getTempFiltered([cat.key]);
                    let hasValidItems = temp.some(item => item[cat.key] === cat.toggleValue);
                    let isSelected = selectedFilters[cat.key] === cat.toggleValue;
                    if (temp.length >= 20 || !hasValidItems) { rowDiv.classList.add('hidden'); rowDiv.classList.remove('flex'); return; }
                    rowDiv.classList.remove('hidden'); rowDiv.classList.add('flex');
                    const toggleBtn = document.getElementById(`cat-toggle-${cat.key}`);
                    if (toggleBtn) {
                        const activeClass = 'bg-orange-500 border-orange-600 text-white shadow-sm';
                        const inactiveClass = 'bg-white border-slate-300 text-slate-700 hover:bg-orange-50 hover:border-orange-200 hover:text-orange-600';
                        toggleBtn.className = `shrink-0 px-5 py-2.5 rounded-xl font-semibold text-sm transition-all border flex items-center gap-2 ${isSelected ? activeClass : inactiveClass}`;
                        toggleBtn.innerHTML = `<i data-lucide="${cat.icon}" class="w-4 h-4"></i> ${isSelected ? `✓ ${catLabel}` : catLabel}`;
                    }
                    return; 
                }
                let availableOptions = [];
                let l2Options = [];
                if (cat.type === 'group_2_levels') {
                    let temp = getTempFiltered(['Input_Voltage_Group']); 
                    l2Options = [...new Set(temp.map(i => i['Input_Voltage']).filter(v => v))];
                    if (l2Options.length === 0) { rowDiv.classList.add('hidden'); rowDiv.classList.remove('flex'); return; }
                } else {
                    availableOptions = getAvailableOptionsForCategory(cat.key);
                    if (availableOptions.length === 0) { rowDiv.classList.add('hidden'); rowDiv.classList.remove('flex'); return; }
                }
                rowDiv.classList.remove('hidden'); rowDiv.classList.add('flex');
                const isExpanded = expandedCategories.has(cat.key);
                const isSelected = selectedFilters[cat.key] !== undefined || (cat.key === 'Wattage_W' && selectedWattageRange !== null) || (cat.key === 'Input_Voltage_Group' && (selectedInputVoltage1 !== null || selectedFilters['Input_Voltage_2'] !== undefined));
                const headerBtn = document.getElementById(`cat-header-${cat.key}`);
                if (headerBtn) {
                    headerBtn.className = `shrink-0 px-5 py-2.5 rounded-xl font-semibold text-sm transition-all border flex items-center gap-2 ${isExpanded || isSelected ? 'bg-blue-50 border-blue-200 text-blue-700 shadow-sm' : 'bg-transparent border-transparent text-slate-600 hover:bg-slate-50'}`;
                    headerBtn.innerHTML = `<i data-lucide="${cat.icon}" class="w-4 h-4 ${isSelected ? 'text-blue-600' : ''}"></i> ${catLabel}`;
                }
                const optionsDiv = document.getElementById(`cat-options-${cat.key}`);
                if (optionsDiv) {
                    optionsDiv.className = `options-container flex flex-row flex-wrap items-center gap-2.5 w-full ${isExpanded || isSelected ? 'expanded' : ''}`;
                    optionsDiv.innerHTML = '';
                    if (cat.type === 'group_2_levels') {
                        let temp = getTempFiltered(['Input_Voltage_Group']); 
                        l2Options.forEach(opt => {
                            const isActive = selectedInputVoltage1 === opt;
                            const btn = document.createElement('button');
                            btn.className = `shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition-all border ${isActive ? 'bg-teal-600 border-teal-600 text-white shadow-sm' : 'bg-white border-slate-300 text-slate-700 hover:bg-teal-50 hover:border-teal-300 hover:text-teal-700'}`;
                            btn.innerText = opt;
                            btn.onclick = () => {
                                if (isActive) { selectedInputVoltage1 = null; delete selectedFilters['Input_Voltage_2']; }
                                else { selectedInputVoltage1 = opt; delete selectedFilters['Input_Voltage_2']; expandedCategories.add(cat.key); let matchingL3 = temp.filter(i => i['Input_Voltage'] === opt).map(i => i['Input_Voltage_2']).filter(v => v); let uniqueL3 = [...new Set(matchingL3)]; if (uniqueL3.length === 1) selectedFilters['Input_Voltage_2'] = uniqueL3[0]; }
                                updateLogic(); renderFilterUI();
                            };
                            optionsDiv.appendChild(btn);
                        });
                        if (selectedInputVoltage1) {
                            const separator = document.createElement('span'); separator.className = 'text-slate-400 mx-1 text-sm font-bold'; separator.innerText = '>'; optionsDiv.appendChild(separator);
                            let l3Options = [...new Set(temp.filter(i => i['Input_Voltage'] === selectedInputVoltage1).map(i => i['Input_Voltage_2']).filter(v => v))];
                            l3Options.forEach(opt => {
                                const isActive = selectedFilters['Input_Voltage_2'] === opt;
                                const btn = document.createElement('button');
                                btn.className = `shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition-all border ${isActive ? 'bg-blue-600 border-blue-600 text-white shadow-sm' : 'bg-white border-slate-300 text-slate-700 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700'}`;
                                btn.innerText = opt;
                                btn.onclick = () => { if (isActive) delete selectedFilters['Input_Voltage_2']; else selectedFilters['Input_Voltage_2'] = opt; updateLogic(); renderFilterUI(); };
                                optionsDiv.appendChild(btn);
                            });
                        }
                    } else if (cat.key === 'Wattage_W') {
                        WATTAGE_RANGES.forEach(range => {
                            let hasData = availableOptions.some(opt => { let w = parseInt(opt) || 0; return w >= range.min && w <= range.max; });
                            if (!hasData && selectedWattageRange !== range.id) return;
                            const isRangeActive = selectedWattageRange === range.id;
                            const rangeBtn = document.createElement('button');
                            rangeBtn.className = `shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition-all border ${isRangeActive ? 'bg-indigo-600 border-indigo-600 text-white shadow-sm' : 'bg-white border-slate-300 text-slate-700 hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-700'}`;
                            rangeBtn.innerText = range.label;
                            rangeBtn.onclick = () => { if (isRangeActive) { selectedWattageRange = null; delete selectedFilters['Wattage_W']; } else { selectedWattageRange = range.id; delete selectedFilters['Wattage_W']; expandedCategories.add('Wattage_W'); } updateLogic(); renderFilterUI(); };
                            optionsDiv.appendChild(rangeBtn);
                        });
                        if (selectedWattageRange) {
                            const separator = document.createElement('span'); separator.className = 'text-slate-400 mx-1 text-sm font-bold'; separator.innerText = '>'; optionsDiv.appendChild(separator);
                            let activeRangeDef = WATTAGE_RANGES.find(r => r.id === selectedWattageRange);
                            let exactOptions = availableOptions.filter(opt => { let w = parseInt(opt) || 0; return w >= activeRangeDef.min && w <= activeRangeDef.max; });
                            exactOptions.forEach(opt => {
                                const isActive = selectedFilters[cat.key] === opt;
                                const optBtn = document.createElement('button');
                                optBtn.className = `shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition-all border ${isActive ? 'bg-blue-600 border-blue-600 text-white shadow-sm' : 'bg-white border-slate-300 text-slate-700 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700'}`;
                                optBtn.innerText = opt + ' W';
                                optBtn.onclick = () => { if (isActive) delete selectedFilters[cat.key]; else selectedFilters[cat.key] = opt; updateLogic(); renderFilterUI(); };
                                optionsDiv.appendChild(optBtn);
                            });
                        }
                    } else {
                        availableOptions.forEach(opt => {
                            const isActive = selectedFilters[cat.key] === opt;
                            const optBtn = document.createElement('button');
                            optBtn.className = `shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition-all border ${isActive ? 'bg-blue-600 border-blue-600 text-white shadow-sm' : 'bg-white border-slate-300 text-slate-700 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700'}`;
                            optBtn.innerText = opt;
                            optBtn.onclick = () => { if (isActive) delete selectedFilters[cat.key]; else selectedFilters[cat.key] = opt; updateLogic(); renderFilterUI(); };
                            optionsDiv.appendChild(optBtn);
                        });
                    }
                }
            });
            lucide.createIcons();
        }

        function updateLogic() {
            let tempBaseForToggle = getTempFiltered(['Price_Positioning']);
            let hasValidToggle = tempBaseForToggle.some(i => i['Price_Positioning'] === 'V');
            if (tempBaseForToggle.length >= 20 || !hasValidToggle) delete selectedFilters['Price_Positioning'];
            filteredData = getTempFiltered();
            filteredData.sort((a, b) => (parseInt(b.Wattage_W) || 0) - (parseInt(a.Wattage_W) || 0));
            checkDisplayRules();
        }

        function getTempFiltered(ignoreKeys = []) {
            return allData.filter(item => {
                for (let key in selectedFilters) if (!ignoreKeys.includes(key) && item[key] !== selectedFilters[key]) return false;
                if (selectedWattageRange && !ignoreKeys.includes('Wattage_W') && !selectedFilters['Wattage_W']) { let w = parseInt(item['Wattage_W']) || 0; let r = WATTAGE_RANGES.find(x => x.id === selectedWattageRange); if (r && (w < r.min || w > r.max)) return false; }
                if (selectedInputVoltage1 && !ignoreKeys.includes('Input_Voltage_Group') && !selectedFilters['Input_Voltage_2']) if (item['Input_Voltage'] !== selectedInputVoltage1) return false;
                return true;
            });
        }

        function getAvailableOptionsForCategory(categoryKey) {
            let tempFiltered = getTempFiltered([categoryKey]);
            let options = [...new Set(tempFiltered.map(item => item[categoryKey]).filter(val => val && val.trim() !== ''))];
            if (categoryKey === 'Wattage_W') options.sort((a, b) => parseInt(a) - parseInt(b)); else options.sort();
            return options;
        }

        function checkDisplayRules() {
            const resultsArea = document.getElementById('results-area');
            const showBtn = document.getElementById('show-results-btn');
            const bottomInqContainer = document.getElementById('bottom-inquiry-container');
            
            const statusTextTop = document.getElementById('status-text-top');
            const statusTextBottom = document.getElementById('status-text-bottom');
            const resultCountTop = document.getElementById('result-count-top');
            const resultCountBottom = document.getElementById('result-count-bottom');
            
            const count = filteredData.length;
            let filterCount = Object.keys(selectedFilters).length;
            if (selectedWattageRange && !selectedFilters['Wattage_W']) filterCount++;
            if (selectedInputVoltage1 && !selectedFilters['Input_Voltage_2']) filterCount++;

            // 重新選取按鈕的顯示邏輯
            const resetBtn = document.getElementById('reset-btn');
            if (filterCount > 0 || selectedWattageRange || selectedInputVoltage1) {
                if (resetBtn) resetBtn.classList.remove('hidden');
            } else {
                if (resetBtn) resetBtn.classList.add('hidden');
            }

            if (count > 51) { 
                if (statusTextTop) statusTextTop.classList.add('hidden'); 
                if (statusTextBottom) statusTextBottom.classList.add('hidden'); 
            } else { 
                if (statusTextTop) statusTextTop.classList.remove('hidden'); 
                if (statusTextBottom) statusTextBottom.classList.remove('hidden'); 
                if (resultCountTop) resultCountTop.innerText = count; 
                if (resultCountBottom) resultCountBottom.innerText = count; 
            }

            if (resultsArea) resultsArea.classList.add('hidden');
            if (showBtn) showBtn.classList.add('hidden');
            if (bottomInqContainer) bottomInqContainer.classList.add('hidden');

            if (count === 0 && filterCount > 0) { 
                if (resultsArea) resultsArea.classList.remove('hidden'); 
                renderResults(); 
            }
            else if (count < 16 && count > 0) { 
                if (resultsArea) resultsArea.classList.remove('hidden'); 
                if (bottomInqContainer) bottomInqContainer.classList.remove('hidden'); // 展開時顯示底部按鈕
                renderResults(); 
            }
            else if (filterCount >= 4) {
                if (showBtn) showBtn.classList.remove('hidden');
            }
        }

        function getEfficiencyBadgeClass(level) {
            if (!level) return 'badge-standard';
            const l = level.toLowerCase();
            if (l.includes('titanium')) return 'badge-titanium';
            if (l.includes('platinum')) return 'badge-platinum';
            if (l.includes('gold')) return 'badge-gold';
            if (l.includes('silver')) return 'badge-silver';
            if (l.includes('bronze')) return 'badge-bronze';
            return 'badge-standard';
        }

        function getFormFactorClass(type) {
            if (!type) return 'bg-slate-100 text-slate-500 border-slate-200';
            const t = type.toUpperCase();
            if (t.includes('ATX')) return 'bg-blue-100 text-blue-700 border-blue-200';
            if (t.includes('SFX')) return 'bg-purple-100 text-purple-700 border-purple-200';
            if (t.includes('TFX')) return 'bg-emerald-100 text-emerald-700 border-emerald-200';
            return 'bg-slate-100 text-slate-500 border-slate-200';
        }

        function renderResults() {
            const container = document.getElementById('results-area');
            if (!container) return;
            container.innerHTML = '';
            const lang = i18n[currentLang];

            if (filteredData.length === 0) {
                // 空狀態：自帶詢問按鈕
                container.innerHTML = `
                    <div class="col-span-full py-16 flex flex-col items-center justify-center bg-white rounded-2xl border border-dashed border-slate-300 text-slate-400">
                        <i data-lucide="frown" class="w-12 h-12 mb-4 text-slate-300"></i>
                        <p class="text-lg font-medium mb-6">${lang.noResult}</p>
                        <button onclick="openInquiryModal()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-md flex items-center gap-2">
                            <i data-lucide="mail-plus" class="w-5 h-5"></i> <span>${lang.inquiry_btn_empty}</span>
                        </button>
                    </div>`;
                lucide.createIcons();
                return;
            }

            filteredData.forEach(item => {
                const card = document.createElement('div');
                const isHighCP = item.Price_Positioning === 'V';
                const baseCard = 'bg-white transition-all duration-300 hover:-translate-y-1 hover:shadow-lg';
                const borderClass = isHighCP ? 'border-2 border-orange-500 shadow-orange-100/50' : 'border border-slate-200 shadow-sm';
                card.className = `relative rounded-2xl p-6 flex flex-col h-full overflow-hidden ${baseCard} ${borderClass}`;
                
                let ribbonHTML = isHighCP ? `<div class="absolute top-0 right-0"><div class="bg-gradient-to-r from-orange-400 to-orange-500 text-white text-[11px] font-black px-4 py-1.5 rounded-bl-xl shadow-sm flex items-center gap-1.5 border-b border-l border-orange-300"><i data-lucide="crown" class="w-3.5 h-3.5"></i> ${lang.cp_badge}</div></div>` : '';
                const badgeClass = getEfficiencyBadgeClass(item.Efficiency_Level);
                const ffClass = getFormFactorClass(item.Form_Factor);

                card.innerHTML = `
                    ${ribbonHTML}
                    <div class="mb-5 pr-20">
                        <div class="inline-block px-2.5 py-1 text-[10px] font-bold tracking-wider rounded border uppercase mb-3 ${ffClass}">
                            ${item.Form_Factor || 'Unknown'}
                        </div>
                        <h3 class="text-xl font-bold text-slate-900 leading-tight mb-1">${item.Model_Name}</h3>
                        <p class="text-xs text-slate-500 font-medium">${item.ATX_Version || 'STD UNDEF'}</p>
                    </div>
                    
                    <div class="flex items-center justify-between mb-6 pb-6 border-b border-slate-100">
                        <div class="flex items-baseline">
                            <span class="text-5xl font-black text-slate-800 tracking-tighter">${item.Wattage_W}</span>
                            <span class="text-blue-600 font-bold text-xl ml-1">W</span>
                        </div>
                        <div class="text-right flex flex-col items-end">
                            <div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">${lang.label_efficiency}</div>
                            <div class="px-3 py-1.5 rounded-lg shadow-sm font-black text-sm tracking-wide ${badgeClass}">${item.Efficiency_Level || '-'}</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 lg:grid-cols-2 gap-3 mb-3">
                        <div class="flex flex-col items-center justify-center p-3 bg-slate-50 rounded-xl border border-slate-100 hover:bg-slate-100 transition-colors text-center">
                            <i data-lucide="cable" class="w-5 h-5 text-blue-500 mb-1.5"></i>
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">${lang.label_modular}</span>
                            <span class="text-sm font-semibold text-slate-700">${item.Modular_Type || '-'}</span>
                        </div>
                        <div class="flex flex-col items-center justify-center p-3 bg-slate-50 rounded-xl border border-slate-100 hover:bg-slate-100 transition-colors text-center">
                            <i data-lucide="cpu" class="w-5 h-5 text-blue-500 mb-1.5"></i>
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">${lang.label_ports}</span>
                            <span class="text-sm font-semibold text-slate-700">${item['12V_2x6_Ports'] > 0 ? item['12V_2x6_Ports'] + lang.unit_ports : lang.val_none}</span>
                        </div>
                        <div class="flex flex-col items-center justify-center p-3 bg-slate-50 rounded-xl border border-slate-100 hover:bg-slate-100 transition-colors text-center">
                            <i data-lucide="plug" class="w-5 h-5 text-blue-500 mb-1.5"></i>
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">${lang.label_voltage}</span>
                            <span class="text-sm font-semibold text-slate-700">${item.Input_Voltage_2 || '-'}</span>
                        </div>
                        <div class="flex flex-col items-center justify-center p-3 bg-slate-50 rounded-xl border border-slate-100 hover:bg-slate-100 transition-colors text-center">
                            <div class="flex gap-2 mb-1.5"><i data-lucide="thermometer" class="w-4 h-4 text-blue-500"></i><i data-lucide="mountain" class="w-4 h-4 text-blue-500"></i></div>
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">${lang.label_env}</span>
                            <span class="text-xs font-semibold text-slate-700 leading-tight">${item.Working_Temp || '-'}<br>${item.Operating_Altitude || '-'}</span>
                        </div>
                    </div>

                    <div class="mt-auto flex items-center gap-2 text-[11px] text-slate-500 bg-slate-50 p-2.5 rounded-lg border border-slate-100">
                        <i data-lucide="layout-template" class="w-3.5 h-3.5 text-slate-400"></i>
                        <div>
                            <span class="font-bold text-slate-400 uppercase tracking-tight">${lang.label_dimensions}:</span> 
                            <span class="text-slate-700 font-medium ml-1">${item.Dimension_2 || '-'} mm</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }
    </script>
</body>
</html>
